<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>课件管理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sidebar-w: 220px;
    --bg: #f2f4f2;
    --surface: #ffffff;
    --border: #e4e8e4;
    --text-primary: #111827;
    --text-secondary: #6b7280;
    --text-muted: #9ca3af;
    --accent: #2d6a4f;
    --accent-light: #e8f5ee;
    --sidebar-bg: #f2f4f2;
    --sidebar-bg-dark: #3a5444;
    --sidebar-text: #6b8f7a;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
    background: var(--sidebar-bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
  }

  /* ── 侧边栏 ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--sidebar-bg);
    min-height: 100vh;
    position: fixed;
    top: 0; left: 0;
    display: flex;
    flex-direction: column;
    padding: 20px 0;
  }
  .sidebar-logo {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 20px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
  }
  .logo-mark {
    width: 26px; height: 26px;
    background: var(--accent-light);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-mark svg { width: 13px; height: 13px; color: var(--accent); }
  .logo-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }

  .nav-section { padding: 0 10px; }
  .nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 10px; border-radius: 7px;
    font-size: 13.5px; color: var(--sidebar-text);
    cursor: pointer; transition: all 0.15s;
  }
  .nav-item:hover { background: var(--border); color: var(--text-primary); }
  .nav-item.active { background: #dce8e2; color: var(--accent); }
  .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }

  .sidebar-footer {
    margin-top: auto;
    padding: 14px 10px 4px;
    border-top: 1px solid var(--border);
  }
  .user-row {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 10px; border-radius: 7px;
    cursor: pointer; transition: background 0.15s;
  }
  .user-row:hover { background: var(--border); }
  .user-avatar {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--accent-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--accent);
  }
  .user-name { font-size: 13px; color: var(--text-secondary); }

  /* ── 主内容 ── */
  .content {
    margin-left: var(--sidebar-w);
    flex: 1;
    padding: 16px;
    display: flex;
    flex-direction: column;
  }

  .content-card {
    background: var(--surface);
    border-radius: 14px;
    flex: 1;
    padding: 28px 32px;
    min-height: calc(100vh - 32px);
  }

  /* 页头 */
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .page-header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.2px; }
  .count-badge {
    font-size: 12px;
    background: var(--accent-light);
    color: var(--accent);
    padding: 2px 9px;
    border-radius: 20px;
    font-weight: 600;
    margin-left: 10px;
  }
  .toolbar { display: flex; gap: 8px; align-items: center; }

  .search-wrap { position: relative; }
  .search-wrap svg {
    position: absolute; left: 9px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted); pointer-events: none;
    width: 13px; height: 13px;
  }
  .search-input {
    padding: 7px 12px 7px 28px;
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 13px;
    background: var(--surface);
    color: var(--text-primary);
    outline: none; width: 200px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(45,106,79,0.08);
  }
  .sort-select {
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 13px;
    background: var(--surface);
    color: var(--text-secondary);
    outline: none; cursor: pointer;
  }

  /* 列表 */
  .list-header {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 150px 96px;
    padding: 8px 12px;
    font-size: 11px; font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.6px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  .list-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 150px 96px;
    align-items: center;
    padding: 11px 12px;
    border-bottom: 1px solid #eef0ee;
    transition: background 0.1s;
    border-radius: 8px;
  }
  .list-row:last-child { border-bottom: none; }
  .list-row:hover { background: #eef4f0; }

  .row-name {
    display: flex; align-items: center; gap: 10px; min-width: 0;
  }
  .file-icon {
    width: 30px; height: 30px; border-radius: 7px;
    background: var(--accent-light);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .file-icon svg { width: 14px; height: 14px; color: var(--accent); }
  .name-text {
    font-size: 13.5px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .row-date { font-size: 12.5px; color: var(--text-muted); }

  /* 操作：图标按钮 */
  .row-actions { display: flex; gap: 4px; justify-content: flex-end; }
  .icon-btn {
    width: 30px; height: 30px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    text-decoration: none;
  }
  .icon-btn svg { width: 15px; height: 15px; }
  .icon-btn:hover { background: #deeae4; color: var(--accent); }

  /* 空状态 */
  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--text-muted); display: none;
  }
  .empty.show { display: block; }
  .empty svg { width: 28px; height: 28px; margin-bottom: 10px; opacity: 0.35; }
  .empty p { font-size: 13.5px; }

  /* toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: #3a5444; color: #c8e6d4;
    padding: 8px 16px; border-radius: 20px;
    font-size: 13px; opacity: 0;
    transition: all 0.2s; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <span class="logo-name">教师工作台</span>
  </div>
  <div class="nav-section">
    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      课件管理
    </div>
  </div>
  <div class="sidebar-footer">
    <div class="user-row">
      <div class="user-avatar">刘</div>
      <span class="user-name">刘老师</span>
    </div>
  </div>
</aside>

<main class="content">
  <div class="content-card">

    <div class="page-header">
      <div>
        <span style="font-size:18px;font-weight:700;">课件管理</span>
        <span class="count-badge" id="countBadge">—</span>
      </div>
      <div class="toolbar">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input class="search-input" id="searchInput" type="text" placeholder="搜索课件…">
        </div>
        <select class="sort-select" id="sortSelect">
          <option value="date-desc">最新发布</option>
          <option value="date-asc">最早发布</option>
          <option value="name">名称排序</option>
        </select>
      </div>
    </div>

    <div class="list-header">
      <div>名称</div>
      <div>发布时间</div>
      <div></div>
    </div>

    <div id="list"></div>

    <div class="empty" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
      <p>没有找到匹配的课件</p>
    </div>

  </div>
</main>

<div class="toast" id="toast">链接已复制</div>

<script>
const DATA = [
  { id: 1, title: "刘润·足力健老人鞋品类分化", publishedAt: "2026-04-01", url: "https://chenxiaoqing-kalu.github.io/outputs/刘润足力健老人鞋品类分化_TXD图文教材.html" },
  { id: 2, title: "刘润·足力健老人鞋品类分化 互动练习", publishedAt: "2026-04-01", url: "https://chenxiaoqing-kalu.github.io/outputs/刘润足力健老人鞋品类分化_IES互动练习.html" },
  { id: 3, title: "产品定价策略与价值感知", publishedAt: "2026-03-28", url: "#" },
  { id: 4, title: "产品定价策略 互动练习", publishedAt: "2026-03-28", url: "#" },
  { id: 5, title: "用户增长飞轮模型", publishedAt: "2026-03-25", url: "#" },
  { id: 6, title: "商业模式画布：从0到1", publishedAt: "2026-03-20", url: "#" },
];

let search = "", sort = "date-desc";

function formatDate(s) {
  const [y, m, d] = s.split("-");
  return `${y}年${m}月${d}日`;
}

function render() {
  let list = DATA.filter(c => !search || c.title.includes(search));
  if (sort === "date-desc") list.sort((a,b) => b.publishedAt.localeCompare(a.publishedAt));
  else if (sort === "date-asc") list.sort((a,b) => a.publishedAt.localeCompare(b.publishedAt));
  else list.sort((a,b) => a.title.localeCompare(b.title));

  document.getElementById("countBadge").textContent = list.length;
  document.getElementById("emptyState").classList.toggle("show", list.length === 0);

  document.getElementById("list").innerHTML = list.map(c => `
    <div class="list-row">
      <div class="row-name">
        <div class="file-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
        </div>
        <span class="name-text">${c.title}</span>
      </div>
      <div class="row-date">${formatDate(c.publishedAt)}</div>
      <div class="row-actions">
        <a class="icon-btn" href="${c.url}" target="_blank" title="预览">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
        <button class="icon-btn" onclick="copyLink('${c.url}')" title="复制链接">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        </button>
      </div>
    </div>
  `).join("");
}

function copyLink(url) {
  navigator.clipboard.writeText(url).then(() => {
    const t = document.getElementById("toast");
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
  });
}

document.getElementById("searchInput").addEventListener("input", e => { search = e.target.value.trim(); render(); });
document.getElementById("sortSelect").addEventListener("change", e => { sort = e.target.value; render(); });
render();
</script>
</body>
</html>
