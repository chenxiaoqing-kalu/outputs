    {

      po: `PO-04：效率攻坚战的策略与壁垒构建`,
      level: 3, levelLabel: `挑战题`,
      type: `choice`,
      stem: `某连锁便利店品牌，目前依赖某外卖平台的流量红利（日均订单ROI=1:6），但竞争者正大量涌入同一平台，ROI已从1:6下滑至1:3。该企业的效率攻坚战应优先聚焦于：`,
      options: [
        `A. 继续加大外卖平台投放预算，以更高曝光维持订单量，等待竞争者因亏损自然退出`,
        `B. 建立中央配送中心（降低单店成本+提升品质稳定性），同步开发会员积分体系（降低对外卖平台依赖），优化库存周转（减少损耗，提升原价率）`,
        `C. 迅速新开200家门店，以规模优势摊薄固定成本，压制竞争者`,
        `D. 将产品线升级为精品有机食品，通过品牌溢价摆脱低价竞争`
      ],
      answer: { primary: `B` }
    }
  ]
};

const TOTAL = 12;
const state = {
  currentQ: 0,
  completed: new Set(),
  firstTryCorrect: new Set(),
  userAnswers: {},
  isCorrect: {},
  attempts: {}
};

function normalize(str) {
  if (!str) return '';
  return str.trim().toLowerCase().replace(/[\s\-,，、]/g, '').replace(/[""]/g, '"');
}

function checkAnswer(q, userInput) {
  if (q.type === 'choice') {
    const sel = typeof userInput === 'string' ? userInput.trim().toUpperCase() : '';
    return sel === q.answer.primary.trim().toUpperCase();
  }
  if (q.type === 'ordering') {
    const n = normalize(userInput);
    const correct = normalize(q.answer.primary);
    if (n === correct) return true;
    if (q.answer.alternatives) return q.answer.alternatives.some(a => normalize(a) === n);
    return false;
  }
  if (q.type === 'matching') {
    // userInput is object {1: val, 2: val, 3: val}
    const correct = q.answer.matchAnswers;
    return Object.keys(correct).every(k => {
      const u = (userInput[k] || '').trim().toUpperCase();
      return u === correct[k].toUpperCase();
    });
  }
  if (q.type === 'fill-multi') {
    // userInput is object {f1: val, f2: val, f3: val}
    return q.fillParts.every(p => {
      const u = normalize(userInput[p.key] || '');
      const c = normalize(p.answer);
      return u === c;
    });
  }
  return false;
}

function renderQuestion(idx) {
  const q = exerciseData.questions[idx];
  const poLabel = q.po;
  const levelClass = `level-${q.level}`;
  const stars = q.level === 1 ? '⭐' : q.level === 2 ? '⭐⭐' : '⭐⭐⭐';
  const storedAnswer = state.userAnswers[q.id];
  const isLocked = state.isCorrect[q.id] === true;
  const wasSubmitted = state.completed.has(q.id);

  let answerHtml = '';

  if (q.type === 'choice') {
    answerHtml = `<div class="options" id="options-${q.id}">`;
    q.options.forEach(opt => {
      const letter = opt.trim().charAt(0);
      const checked = storedAnswer === letter ? 'checked' : '';
      let extraClass = '';
      if (wasSubmitted) {
        if (letter === q.answer.primary) extraClass = 'correct-ans';
        else if (storedAnswer === letter && !state.isCorrect[q.id]) extraClass = 'wrong-ans';
      }
      answerHtml += `<label class="option-label ${extraClass}" onclick="selectOption('${q.id}','${letter}')">
        <input type="radio" name="q_${q.id}" value="${letter}" ${checked} ${isLocked ? 'disabled' : ''}>
        <span>${opt}</span>
      </label>`;
    });
    answerHtml += `</div>`;

  } else if (q.type === 'fill-multi') {
    answerHtml = `<div class="fill-questions">`;
    q.fillParts.forEach(p => {
      const val = (storedAnswer && storedAnswer[p.key]) || '';
      const inputClass = wasSubmitted ? (state.isCorrect[q.id] || (storedAnswer && normalize(storedAnswer[p.key]) === normalize(p.answer)) ? 'correct' : 'wrong') : '';
      answerHtml += `<span class="fill-item">${p.before}<input type="text" class="fill-input ${inputClass}" id="fill-${q.id}-${p.key}" value="${val}" ${isLocked ? 'disabled' : ''}>${p.after}</span> `;
    });
    answerHtml += `</div>`;

  } else if (q.type === 'matching') {
    answerHtml = `<table class="match-table">
      <thead><tr><th>痛点</th><th>填入解决方案字母</th></tr></thead><tbody>`;
    q.matchItems.forEach(item => {
      const val = (storedAnswer && storedAnswer[item.key]) || '';
      const inputClass = wasSubmitted ? (storedAnswer && storedAnswer[item.key] && storedAnswer[item.key].toUpperCase() === q.answer.matchAnswers[item.key].toUpperCase() ? 'correct' : 'wrong') : '';
      answerHtml += `<tr><td>${item.key}. ${item.text}</td>
        <td><input type="text" class="match-input ${inputClass}" id="match-${q.id}-${item.key}" value="${val}" maxlength="1" ${isLocked ? 'disabled' : ''}></td></tr>`;
    });
    answerHtml += `</tbody></table>
    <ul class="options-list">`;
    q.matchOptions.forEach(opt => {
      answerHtml += `<li><strong>${opt.key}.</strong> ${opt.text}</li>`;
    });
    answerHtml += `</ul>`;

  } else if (q.type === 'ordering') {
    const val = storedAnswer || '';
    const inputClass = wasSubmitted ? (state.isCorrect[q.id] ? 'correct' : 'wrong') : '';
    answerHtml = `<ul class="ordering-items">`;
    q.orderItems.forEach(item => {
      answerHtml += `<li><span class="item-key">${item.key}.</span><span>${item.text}</span></li>`;
    });
    answerHtml += `</ul>
    <div class="ordering-input-wrap">
      <label>按正确顺序填入字母（用 - 连接，如：X-X-X-X-X）</label>
      <input type="text" class="ordering-input ${inputClass}" id="ord-${q.id}" value="${val}" placeholder="X-X-X-X-X" ${isLocked ? 'disabled' : ''}>
    </div>`;
  }

  // Feedback
  let feedbackHtml = '';
  if (wasSubmitted) {
    if (state.isCorrect[q.id]) {
      feedbackHtml = `<div class="feedback correct">✅ 正确！</div>`;
    } else {
      feedbackHtml = `<div class="feedback wrong">❌ 答错了，可以继续修改重试。</div>`;
    }
  } else {
    feedbackHtml = `<div class="feedback" id="fb-${q.id}"></div>`;
  }

  const stemDisplay = q.stem.replace(/\n/g, '<br>');

  const html = `
    <div class="po-label">${poLabel}</div>
    <div class="question-card"
         data-track-id="${q.id}"
         data-track-type="question"
         data-track-trigger="visible"
         data-track-meta='{"level":${q.level},"levelLabel":"${q.levelLabel}","type":"${q.type}"}'>
      <div class="level-badge ${levelClass}">${stars} ${q.levelLabel}</div>
      <div class="q-stem">${stemDisplay}</div>
      ${answerHtml}
      ${feedbackHtml}
      <div class="btn-group">
        <button class="btn-submit" onclick="submitAnswer('${q.id}')" ${isLocked ? 'disabled' : ''} data-track-action="/submit_answer">
          ${isLocked ? '已完成 ✓' : '提交答案'}
        </button>
      </div>
    </div>`;

  document.getElementById('main-area').innerHTML = html;
  updateNav();
}

function selectOption(qId, letter) {
  const q = exerciseData.questions.find(x => x.id === qId);
  if (state.isCorrect[qId]) return;
  state.userAnswers[qId] = letter;
  document.querySelectorAll(`input[name="q_${qId}"]`).forEach(r => {
    r.checked = r.value === letter;
    r.closest('.option-label').classList.toggle('selected', r.value === letter);
  });
}

function getAnswer(q) {
  if (q.type === 'choice') {
    return state.userAnswers[q.id] || null;
  }
  if (q.type === 'ordering') {
    const el = document.getElementById(`ord-${q.id}`);
    return el ? el.value.trim() : (state.userAnswers[q.id] || null);
  }
  if (q.type === 'matching') {
    const ans = {};
    q.matchItems.forEach(item => {
      const el = document.getElementById(`match-${q.id}-${item.key}`);
      if (el) ans[item.key] = el.value.trim();
    });
    return ans;
  }
  if (q.type === 'fill-multi') {
    const ans = {};
    q.fillParts.forEach(p => {
      const el = document.getElementById(`fill-${q.id}-${p.key}`);
      if (el) ans[p.key] = el.value.trim();
    });
    return ans;
  }
  return null;
}

function submitAnswer(qId) {
  const q = exerciseData.questions.find(x => x.id === qId);
  const answer = getAnswer(q);

  // Empty check
  let isEmpty = false;
  if (answer === null || answer === '') isEmpty = true;
  if (typeof answer === 'object' && answer !== null) {
    isEmpty = Object.values(answer).every(v => !v || v.trim() === '');
  }
  if (isEmpty) {
    showFeedback(qId, 'hint', '请先填写答案再提交。');
    return;
  }

  // Save answer
  state.userAnswers[qId] = answer;

  // First attempt tracking
  const isFirst = !state.completed.has(qId);
  if (isFirst) state.completed.add(qId);

  const correct = checkAnswer(q, answer);
  state.isCorrect[qId] = correct;
  if (isFirst && correct) state.firstTryCorrect.add(qId);

  // Re-render to show result state
  renderQuestion(state.currentQ);

  // Check if all done
  if (state.completed.size === TOTAL) {
    setTimeout(showSummary, 600);
  }
}

function showFeedback(qId, type, msg) {
  const el = document.getElementById(`fb-${qId}`);
  if (el) {
    el.className = `feedback ${type}`;
    el.textContent = msg;
  }
}

function navigate(dir) {
  const newIdx = state.currentQ + dir;
  if (newIdx < 0 || newIdx >= TOTAL) return;
  state.currentQ = newIdx;
  renderQuestion(newIdx);
  window.scrollTo(0, 0);
}

function updateNav() {
  const idx = state.currentQ;
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').disabled = idx === TOTAL - 1;
  document.getElementById('header-counter').textContent = `${idx + 1} / ${TOTAL}`;
  document.getElementById('nav-stats').innerHTML = `已完成 <strong>${state.completed.size}</strong> / ${TOTAL}`;
  const pct = (state.completed.size / TOTAL) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function showSummary() {
  const firstCorrect = state.firstTryCorrect.size;
  const rate = Math.round((firstCorrect / TOTAL) * 100);
  let commentClass, commentText;
  if (rate >= 90) { commentClass = 'great'; commentText = `🎉 太棒了！一次正确率 ${rate}%，品类分化的核心概念掌握得非常扎实！`; }
  else if (rate >= 70) { commentClass = 'good'; commentText = `👍 不错！一次正确率 ${rate}%，核心框架已基本掌握，再巩固几道错题就更完美了。`; }
  else if (rate >= 50) { commentClass = 'ok'; commentText = `💪 继续加油！一次正确率 ${rate}%，建议回顾错题对应的课程内容，重点理解判断标准。`; }
  else { commentClass = 'low'; commentText = `📖 建议复习！一次正确率 ${rate}%，推荐重新学习课程后再做一遍练习。`; }

  let detailHtml = '';
  exerciseData.questions.forEach(q => {
    const correct = state.isCorrect[q.id];
    const tag = correct ? `<span class="tag-correct">✓ 正确</span>` : `<span class="tag-wrong">✗ 错误</span>`;
    let correctAnsHtml = '';
    if (!correct && state.completed.has(q.id)) {
      let ans = q.answer ? q.answer.primary : '';
      if (q.type === 'fill-multi') {
        ans = q.fillParts.map(p => `${p.before.replace(/（\d+）/, '').trim()} ${p.answer}`).join('；');
      } else if (q.type === 'matching') {
        ans = q.matchItems.map(item => `${item.key}-${q.answer.matchAnswers[item.key]}`).join(', ');
      }
      correctAnsHtml = `<div class="correct-ans-show">正确答案：<strong>${ans}</strong></div>`;
    }
    detailHtml += `<div class="detail-item">
      <div class="q-id">${q.id} · ${q.levelLabel}</div>
      <div class="q-result">${tag} <span style="font-size:13px;color:#666;">${q.stem.replace(/\n/g,'').substring(0,40)}...</span></div>
      ${correctAnsHtml}
    </div>`;
  });

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-title">练习完成！</div>
    <div class="modal-score">${firstCorrect} / ${TOTAL}</div>
    <div class="modal-subtitle">一次答对 ${firstCorrect} 题 · 一次正确率 ${rate}%</div>
    <div class="modal-comment ${commentClass}">${commentText}</div>
    <div class="detail-title">答题详情</div>
    ${detailHtml}
    <button class="btn-retry" onclick="retryAll()">重新练习</button>`;

  document.getElementById('summary-modal').classList.add('show');
}

function retryAll() {
  state.currentQ = 0;
  state.completed.clear();
  state.firstTryCorrect.clear();
  Object.keys(state.userAnswers).forEach(k => delete state.userAnswers[k]);
  Object.keys(state.isCorrect).forEach(k => delete state.isCorrect[k]);
  Object.keys(state.attempts).forEach(k => delete state.attempts[k]);
  document.getElementById('summary-modal').classList.remove('show');
  renderQuestion(0);
  document.getElementById('progress-bar').style.width = '0%';
}

// Init
renderQuestion(0);
</script>
