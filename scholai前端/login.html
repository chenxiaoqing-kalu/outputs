<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · Scholai</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
    background: #fcfcfc;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    position: relative; overflow: hidden;
  }

  /* 背景装饰 */
  .bg-blob {
    position: absolute; border-radius: 50%;
    pointer-events: none; filter: blur(80px);
  }
  .blob-1 { top: -10%; right: -5%; width: 500px; height: 500px; background: rgba(255,237,213,0.5); }
  .blob-2 { bottom: -10%; left: -5%; width: 500px; height: 500px; background: rgba(231,229,228,0.5); }

  /* 卡片 */
  .card {
    width: 100%; max-width: 360px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.9);
    border-radius: 20px;
    padding: 28px 24px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.04);
    position: relative; z-index: 1;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Logo 区域 */
  .logo-area {
    text-align: center; margin-bottom: 28px;
  }
  .logo-icon {
    width: 48px; height: 48px;
    background: #E9EEEA;
    border: 1px solid #C8D8D2;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .logo-icon svg { width: 24px; height: 24px; color: #2F4F4F; }
  .logo-area h1 { font-size: 19px; font-weight: 700; color: #1c1917; letter-spacing: -0.3px; margin-bottom: 4px; }
  .logo-area p  { font-size: 12px; color: #a8a29e; }

  /* 表单 */
  .field { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 11.5px; font-weight: 500; color: #78716c;
    margin-bottom: 6px; margin-left: 2px;
  }
  input[type="tel"], input[type="text"], input[type="password"] {
    width: 100%; padding: 10px 12px;
    background: #f5f5f4;
    border: 1px solid #e7e5e4;
    border-radius: 9px;
    font-size: 14px; color: #1c1917;
    outline: none; transition: border-color 0.15s, box-shadow 0.15s;
    appearance: none;
  }
  input:focus {
    border-color: #2F4F4F;
    box-shadow: 0 0 0 3px rgba(47,79,79,0.08);
    background: #fff;
  }
  input::placeholder { color: #a8a29e; }

  /* 验证码行 */
  .code-row { display: flex; gap: 8px; }
  .code-row input { flex: 1; text-align: center; letter-spacing: 4px; font-size: 15px; }
  .btn-code {
    flex-shrink: 0; min-width: 96px;
    padding: 10px 12px; border-radius: 9px;
    font-size: 12px; font-weight: 500;
    color: #2F4F4F; background: #fff;
    border: 1px solid #C8D8D2;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn-code:hover:not(:disabled) { background: #EDF4ED; border-color: #2F4F4F; }
  .btn-code:disabled { color: #a8a29e; background: #f5f5f4; border-color: #e7e5e4; cursor: not-allowed; }

  /* 协议 */
  .agree-row {
    display: flex; align-items: flex-start; gap: 8px;
    margin-bottom: 16px; padding: 0 2px;
  }
  .agree-row input[type="checkbox"] {
    width: 14px; height: 14px; flex-shrink: 0;
    margin-top: 1px; cursor: pointer;
    accent-color: #2F4F4F;
    border-radius: 3px;
  }
  .agree-row label {
    font-size: 11.5px; color: #78716c;
    margin: 0; cursor: pointer; line-height: 1.5;
  }
  .agree-row a { color: #2F4F4F; font-weight: 500; text-decoration: none; }
  .agree-row a:hover { text-decoration: underline; }

  /* 错误 */
  .error {
    font-size: 12px; color: #ef4444;
    display: flex; align-items: center; gap: 5px;
    margin-bottom: 12px; padding: 0 2px;
    display: none;
  }
  .error.show { display: flex; }
  .error::before { content: ''; width: 5px; height: 5px; background: #ef4444; border-radius: 50%; flex-shrink: 0; }

  /* 提交按钮 */
  .btn-submit {
    width: 100%; padding: 11px;
    background: #2F4F4F; color: #fff;
    border: none; border-radius: 9px;
    font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    box-shadow: 0 4px 14px rgba(47,79,79,0.2), 0 1px 3px rgba(47,79,79,0.15);
  }
  .btn-submit:hover { background: #3a6363; box-shadow: 0 6px 20px rgba(47,79,79,0.25); transform: translateY(-1px); }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit svg { width: 15px; height: 15px; }

  /* 加载 spinner */
  .spinner {
    width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    animation: spin 0.6s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 底部提示 */
  .footer-hint {
    margin-top: 20px; text-align: center;
  }
  .footer-hint p { font-size: 10.5px; color: #a8a29e; margin-bottom: 8px; }
  .footer-secure {
    display: flex; align-items: center; justify-content: center; gap: 5px;
    font-size: 10px; color: #c7c3bf;
  }
  .footer-secure svg { width: 11px; height: 11px; }

  /* 返回链接 */
  .back-link {
    position: fixed; top: 20px; left: 24px;
    display: flex; align-items: center; gap: 5px;
    font-size: 13px; color: #78716c; text-decoration: none;
    transition: color 0.15s;
  }
  .back-link:hover { color: #1c1917; }
  .back-link svg { width: 14px; height: 14px; }

  /* toast */
  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: #292524; color: #d6d3d1;
    padding: 8px 16px; border-radius: 20px;
    font-size: 12.5px; opacity: 0;
    transition: all 0.2s; pointer-events: none; z-index: 99;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="bg-blob blob-1"></div>
<div class="bg-blob blob-2"></div>

<a class="back-link" href="index.html">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  返回首页
</a>

<div class="card">

  <div class="logo-area">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
    </div>
    <h1>Scholai</h1>
    <p>您的智能教学助手</p>
  </div>

  <div class="field">
    <label>账号</label>
    <input type="text" id="phone" placeholder="请输入账号" oninput="clearError()">
  </div>

  <div class="field">
    <label>密码</label>
    <input type="password" id="code" placeholder="请输入密码" oninput="clearError()">
  </div>

  <div class="agree-row">
    <input type="checkbox" id="agree">
    <label for="agree">
      我已阅读并同意 <a href="#">服务条款</a> 和 <a href="#">隐私政策</a>
    </label>
  </div>

  <div class="error" id="error"></div>

  <button class="btn-submit" id="submitBtn" type="button" onclick="handleLogin()">
    <span id="btnText">进入 Scholai</span>
    <svg id="btnArrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    <div class="spinner" id="spinner"></div>
  </button>

  <div class="footer-hint">
    <p>新用户输入账号和密码后将自动创建账号</p>
    <div class="footer-secure">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Scholai 安全认证
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.classList.add('show');
}
function clearError() {
  document.getElementById('error').classList.remove('show');
}

function handleLogin() {
  const phone    = document.getElementById('phone').value.trim();
  const password = document.getElementById('code').value;
  const agree    = document.getElementById('agree').checked;

  if (!phone)               { showError('请输入账号'); return; }
  if (password.length < 1) { showError('请输入密码'); return; }
  if (!agree)                    { showError('请先阅读并同意服务条款和隐私政策'); return; }

  clearError();
  document.getElementById('btnText').style.display = 'none';
  document.getElementById('btnArrow').style.display = 'none';
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('submitBtn').disabled = true;

  setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
}
</script>
</body>
</html>
