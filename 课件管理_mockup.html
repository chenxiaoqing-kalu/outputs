<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>课件管理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sidebar-w: 220px;
    --bg: #f2f4f2;
    --surface: #ffffff;
    --border: #e4e8e4;
    --text-primary: #111827;
    --text-secondary: #6b7280;
    --text-muted: #9ca3af;
    --accent: #2d6a4f;
    --accent-light: #e8f5ee;
    --sidebar-bg: #f2f4f2;
    --sidebar-text: #6b8f7a;
    --danger: #dc2626;
    --danger-light: #fef2f2;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
    background: var(--sidebar-bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
  }

  /* ── 侧边栏 ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--sidebar-bg);
    min-height: 100vh;
    position: fixed;
    top: 0; left: 0;
    display: flex;
    flex-direction: column;
    padding: 20px 0;
  }
  .sidebar-logo {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 20px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
  }
  .logo-mark {
    width: 26px; height: 26px;
    background: var(--accent-light);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-mark svg { width: 13px; height: 13px; color: var(--accent); }
  .logo-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }

  .nav-section { padding: 0 10px; }
  .nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 10px; border-radius: 7px;
    font-size: 13.5px; color: var(--sidebar-text);
    cursor: pointer; transition: all 0.15s;
  }
  .nav-item:hover { background: var(--border); color: var(--text-primary); }
  .nav-item.active { background: #dce8e2; color: var(--accent); }
  .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }

  .sidebar-footer {
    margin-top: auto;
    padding: 14px 10px 4px;
    border-top: 1px solid var(--border);
  }
  .user-row {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 10px; border-radius: 7px;
    cursor: pointer; transition: background 0.15s;
  }
  .user-row:hover { background: var(--border); }
  .user-avatar {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--accent-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--accent);
  }
  .user-name { font-size: 13px; color: var(--text-secondary); }

  /* ── 主内容 ── */
  .content {
    margin-left: var(--sidebar-w);
    flex: 1;
    padding: 16px;
    display: flex;
    flex-direction: column;
  }
  .content-card {
    background: var(--surface);
    border-radius: 14px;
    flex: 1;
    padding: 28px 32px;
    min-height: calc(100vh - 32px);
  }

  /* 页头 */
  .page-header {
    margin-bottom: 20px;
  }
  .page-header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.2px; display: inline; }
  .count-badge {
    font-size: 12px;
    background: var(--accent-light);
    color: var(--accent);
    padding: 2px 9px;
    border-radius: 20px;
    font-weight: 600;
    margin-left: 10px;
    vertical-align: middle;
  }

  /* 列表 */
  .list-header {
    display: grid;
    grid-template-columns: 3fr 2fr 1.5fr;
    padding: 8px 12px;
    font-size: 11px; font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.6px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  .list-row {
    display: grid;
    grid-template-columns: 3fr 2fr 1.5fr;
    align-items: center;
    padding: 11px 12px;
    border-bottom: 1px solid #eef0ee;
    transition: background 0.1s;
    border-radius: 8px;
  }
  .list-row:last-child { border-bottom: none; }
  .list-row:hover { background: #eef4f0; }

  .row-name {
    display: flex; align-items: center; gap: 10px; min-width: 0;
  }
  .file-icon {
    width: 30px; height: 30px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .file-icon svg { width: 14px; height: 14px; }
  .fmt-icon-html { background: #e8f5ee; color: #2d6a4f; }
  .fmt-icon-md   { background: #eef0fe; color: #4a58e0; }
  .fmt-icon-pdf  { background: #fef3e8; color: #c2670a; }
  .fmt-icon-srt  { background: #f5f0fe; color: #7c3aed; }
  .name-text {
    font-size: 13.5px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .row-date { font-size: 12.5px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; }

  /* 操作图标按钮 */
  .row-actions { display: flex; gap: 4px; justify-content: center; }
  .icon-btn {
    width: 30px; height: 30px;
    border-radius: 7px; border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    text-decoration: none;
  }
  .icon-btn svg { width: 15px; height: 15px; }
  .icon-btn:hover { background: #deeae4; color: var(--accent); }
  .icon-btn.delete:hover { background: var(--danger-light); color: var(--danger); }

  /* 格式标签 */
  .fmt-tag {
    font-size: 10.5px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 5px;
    flex-shrink: 0;
    letter-spacing: 0.3px;
  }
  .fmt-html { background: #e8f5ee; color: #2d6a4f; }
  .fmt-md   { background: #eef0fe; color: #4a58e0; }
  .fmt-pdf  { background: #fef3e8; color: #c2670a; }
  .fmt-srt  { background: #f5f0fe; color: #7c3aed; }
  .fmt-other { background: #f3f4f6; color: #6b7280; }

  /* 删除确认弹窗 */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.25);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal {
    background: #fff;
    border-radius: 14px;
    padding: 28px;
    width: 360px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    transform: translateY(8px);
    transition: transform 0.2s;
  }
  .modal-overlay.show .modal { transform: translateY(0); }
  .modal-icon {
    width: 40px; height: 40px;
    background: var(--danger-light);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
  }
  .modal-icon svg { width: 20px; height: 20px; color: var(--danger); }
  .modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
  .modal p { font-size: 13.5px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 20px; }
  .modal-name { font-weight: 600; color: var(--text-primary); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn {
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 13.5px; font-weight: 500;
    border: none; cursor: pointer;
    transition: all 0.15s;
  }
  .btn-cancel { background: var(--bg); color: var(--text-secondary); }
  .btn-cancel:hover { background: var(--border); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #b91c1c; }

  /* 空状态 */
  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--text-muted); display: none;
  }
  .empty.show { display: block; }
  .empty svg { width: 28px; height: 28px; margin-bottom: 10px; opacity: 0.35; }
  .empty p { font-size: 13.5px; }

  /* toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: #3a5444; color: #c8e6d4;
    padding: 8px 16px; border-radius: 20px;
    font-size: 13px; opacity: 0;
    transition: all 0.2s; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <span class="logo-name">教师工作台</span>
  </div>
  <div class="nav-section">
    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      课件管理
    </div>
  </div>
  <div class="sidebar-footer">
    <div class="user-row">
      <div class="user-avatar">刘</div>
      <span class="user-name">刘老师</span>
    </div>
  </div>
</aside>

<main class="content">
  <div class="content-card">

    <div class="page-header">
      <h1>课件管理</h1>
      <span class="count-badge" id="countBadge">—</span>
    </div>

    <div class="list-header">
      <div>名称</div>
      <div style="text-align:center">发布时间</div>
      <div style="text-align:center">操作</div>
    </div>

    <div id="list"></div>

    <div class="empty" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
      <p>暂无课件</p>
    </div>

  </div>
</main>

<!-- 删除确认弹窗 -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <div class="modal-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
      </svg>
    </div>
    <h3>确认删除</h3>
    <p>即将删除课件 <span class="modal-name" id="deleteTitle"></span>，此操作不可撤销。</p>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeDelete()">取消</button>
      <button class="btn btn-danger" onclick="confirmDelete()">确认删除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">链接已复制</div>

<script>
let DATA = [
  { id: 1, title: "刘润·足力健老人鞋品类分化 图文教材", publishedAt: "2026-04-01 14:32", format: "HTML", url: "https://chenxiaoqing-kalu.github.io/outputs/刘润足力健老人鞋品类分化_TXD图文教材.html" },
  { id: 2, title: "刘润·足力健老人鞋品类分化 互动练习", publishedAt: "2026-04-01 15:10", format: "HTML", url: "https://chenxiaoqing-kalu.github.io/outputs/刘润足力健老人鞋品类分化_IES互动练习.html" },
  { id: 3, title: "产品定价策略与价值感知 图文教材", publishedAt: "2026-03-28 09:45", format: "HTML", url: "#" },
  { id: 4, title: "产品定价策略 互动练习", publishedAt: "2026-03-28 11:20", format: "HTML", url: "#" },
  { id: 5, title: "用户增长飞轮模型 图文教材", publishedAt: "2026-03-25 16:05", format: "PDF", url: "#" },
  { id: 6, title: "商业模式画布：从0到1 教学目标", publishedAt: "2026-03-20 10:00", format: "MD", url: "#" },
  { id: 7, title: "刘小排开营仪式 字幕文件", publishedAt: "2026-03-18 09:00", format: "SRT", url: "#" },
];

let pendingDeleteId = null;

function formatDate(s) {
  const [date, time] = s.split(" ");
  const [y, m, d] = date.split("-");
  return `${y}年${m}月${d}日 ${time}`;
}

const FILE_ICONS = {
  html: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`,
  md:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,
  pdf:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 13h1a2 2 0 000-4H9v6m5-6h2m-2 3h2"/></svg>`,
  srt:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>`,
};

function getIcon(fmt) {
  return FILE_ICONS[fmt.toLowerCase()] || FILE_ICONS.md;
}

function render() {
  document.getElementById("countBadge").textContent = DATA.length;
  document.getElementById("emptyState").classList.toggle("show", DATA.length === 0);

  document.getElementById("list").innerHTML = DATA.map(c => `
    <div class="list-row" id="row-${c.id}">
      <div class="row-name">
        <div class="file-icon fmt-icon-${c.format.toLowerCase()}">
          ${getIcon(c.format)}
        </div>
        <span class="name-text">${c.title}</span>
        <span class="fmt-tag fmt-${c.format.toLowerCase()}">${c.format}</span>
      </div>
      <div class="row-date">${formatDate(c.publishedAt)}</div>
      <div class="row-actions">
        <a class="icon-btn" href="${c.url}" target="_blank" title="预览">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
        <button class="icon-btn" onclick="copyLink('${c.url}')" title="复制链接">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        </button>
        <button class="icon-btn delete" onclick="openDelete(${c.id}, '${c.title.replace(/'/g, "\\'")}')" title="删除">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
          </svg>
        </button>
      </div>
    </div>
  `).join("");
}

function copyLink(url) {
  navigator.clipboard.writeText(url).then(() => {
    const t = document.getElementById("toast");
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
  });
}

function openDelete(id, title) {
  pendingDeleteId = id;
  document.getElementById("deleteTitle").textContent = `"${title}"`;
  document.getElementById("deleteModal").classList.add("show");
}

function closeDelete() {
  pendingDeleteId = null;
  document.getElementById("deleteModal").classList.remove("show");
}

function confirmDelete() {
  if (pendingDeleteId === null) return;
  DATA = DATA.filter(c => c.id !== pendingDeleteId);
  closeDelete();
  render();
}

// 点击遮罩关闭
document.getElementById("deleteModal").addEventListener("click", function(e) {
  if (e.target === this) closeDelete();
});

render();
</script>
</body>
</html>
