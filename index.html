<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outputs · 教学资源库</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
    background: #f4f6f4;
    color: #333;
    min-height: 100vh;
  }

  header {
    background: #fff;
    border-bottom: 1px solid #e4e8e4;
    padding: 28px 2rem 24px;
    text-align: center;
  }
  header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #1a2e25;
    margin-bottom: 6px;
    letter-spacing: -0.3px;
  }
  header p {
    font-size: 14px;
    color: #888;
  }

  .container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 32px 2rem 48px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  .card {
    background: #fff;
    border: 1px solid #e4e8e4;
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    transition: transform 0.18s, box-shadow 0.18s;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  }

  .card-title {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 14.5px;
    font-weight: 700;
    color: #1a2e25;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid #f0f2f0;
  }
  .card-title-icon {
    font-size: 16px;
  }

  .doc-group {
    flex-grow: 1;
  }
  .doc-group + .doc-group {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid #f0f2f0;
  }
  .doc-group h3 {
    font-size: 10.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: #aaa;
    margin-bottom: 8px;
  }

  ul {
    list-style: none;
    padding: 0;
  }
  li {
    margin-bottom: 5px;
  }
  li a {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 7px;
    font-size: 13px;
    color: #3a5444;
    text-decoration: none;
    background: #fafafa;
    border: 1px solid #efefef;
    transition: all 0.15s;
    word-break: break-word;
  }
  li a:hover {
    background: #eef5f0;
    border-color: #c8ddd0;
    color: #1a2e25;
  }
  .link-icon { font-size: 14px; flex-shrink: 0; }
  .link-text { flex: 1; }
  .tag {
    font-size: 10px;
    font-weight: 600;
    background: #ecf0f1;
    color: #888;
    padding: 2px 7px;
    border-radius: 10px;
    flex-shrink: 0;
    letter-spacing: 0.3px;
  }
  .tag.html { background: #e8f5ee; color: #2d6a4f; }
  .tag.md { background: #eef0fe; color: #4a58e0; }
</style>
</head>
<body>

<header>

        刘润·足力健老人鞋品类分化
      </div>
      <div class="doc-group">
        <h3>网页课件</h3>

              <span class="link-icon">📄</span>
              <span class="link-text">TXD 图文教材</span>

          <li>

            </a>
          </li>
        </ul>
      </div>
    </div>

    <!-- ── 设计原型 ── -->

        <h3>页面原型</h3>
        <ul>

            </a>

        </ul>

  </div>
</div>

</html>
